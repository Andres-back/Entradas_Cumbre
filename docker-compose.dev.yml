services:
  postgres:
    image: postgres:16-alpine
    container_name: cumbre-impacto-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: cumbre_impacto
      POSTGRES_PASSWORD: cumbre_impacto
      POSTGRES_DB: cumbre_impacto
    ports:
      - "5434:5432"
    volumes:
      - cumbre_impacto_postgres_dev:/var/lib/postgresql/data

volumes:
  cumbre_impacto_postgres_dev:
