# ============================================================
# Bajo el Capó — Produccion
#
# Primer despliegue:
#   1. Copia .env.production.example a .env.production y editalo
#   2. docker compose --env-file .env.production up -d --build
#
# Requisitos en el VPS: Docker 24+ con compose plugin
# ============================================================

services:
  # ---- PostgreSQL 16 ----
  db:
    image: postgres:16-alpine
    container_name: bajoelcapo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bajoelcapo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: bajoelcapo
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bajoelcapo -d bajoelcapo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---- Next.js App ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bajoelcapo-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: bajoelcapo
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- Caddy Reverse Proxy (auto HTTPS via Let's Encrypt) ----
  caddy:
    image: caddy:2-alpine
    container_name: bajoelcapo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
