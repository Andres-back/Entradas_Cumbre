# ============================================================
# Cumbre Impacto Putumayo 2026 - Producción
#
# Primer despliegue:
#   1. Copia .env.production.example a .env.production y edítalo
#   2. docker compose --env-file .env.production up -d --build
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: cumbre-impacto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cumbre_impacto
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cumbre_impacto
    volumes:
      - cumbre_impacto_pgdata:/var/lib/postgresql/data
    networks:
      - cumbre-impacto-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cumbre_impacto -d cumbre_impacto"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cumbre-impacto-app
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: cumbre_impacto
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cumbre-impacto-network

  caddy:
    image: caddy:2-alpine
    container_name: cumbre-impacto-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - cumbre_impacto_caddy_data:/data
      - cumbre_impacto_caddy_config:/config
    networks:
      - cumbre-impacto-network
    depends_on:
      - app

volumes:
  cumbre_impacto_pgdata:
  cumbre_impacto_caddy_data:
  cumbre_impacto_caddy_config:

networks:
  cumbre-impacto-network:
    driver: bridge

